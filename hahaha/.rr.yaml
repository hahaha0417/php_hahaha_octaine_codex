version: '3'
rpc:
    listen: 'tcp://127.0.0.1:7001'
server:
    command: 'php vendor/bin/rr-worker start'
    relay: pipes
http:
    address: '127.0.0.1:10000'
    middleware:
        - gzip
        - static
    static:
        dir: public
        forbid:
            - .php
            - .htaccess
    pool:
        num_workers: 4
        supervisor:
            max_worker_memory: 1000
